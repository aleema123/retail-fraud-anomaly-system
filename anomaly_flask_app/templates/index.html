<!DOCTYPE html>
<html>
<head>
    <title>Retail Anomaly Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="box">

<h1>Retail Anomaly Detection</h1>

<form action="/upload" method="post" enctype="multipart/form-data">

    <input type="file" name="file" required>

    <div class="threshold-row">
        Threshold:
        <input type="number" name="threshold" step="0.1" value="2.0">
    </div>

    <button type="submit">Detect Anomalies</button>

</form>

{% if show_result %}

<hr>

<h2>Results</h2>

<table class="result-table">

<tr><td>File:</td><td>{{ filename }}</td></tr>
<tr><td>Detected Column:</td><td>{{ column }}</td></tr>
<tr><td>Total Transactions:</td><td>{{ total }}</td></tr>
<tr><td>Threshold Used:</td><td>{{ threshold }}</td></tr>
<tr><td>Anomalies Found:</td><td>{{ anomalies }}</td></tr>
<tr><td>Total |Z-score|:</td><td>{{ total_z }}</td></tr>
<tr><td>Anomaly |Z-score|:</td><td>{{ anomaly_z }}</td></tr>

</table>

<div class="charts">
    <img src="{{ url_for('static', filename='chart1.png') }}">
    <img src="{{ url_for('static', filename='chart2.png') }}">
    <img src="{{ url_for('static', filename='chart3.png') }}">
</div>

<div class="download">
    <a href="/download">
        <button type="button">Download Report</button>
    </a>
</div>

{% endif %}

</div>

</body>
</html>
