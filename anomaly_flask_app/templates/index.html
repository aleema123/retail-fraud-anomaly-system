<!-- templates/index.html -->

<!DOCTYPE html>
<html>
<head>
    <title>Retail Anomaly Detection</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f8;
            padding:30px;
        }

        .box{
            width:950px;
            margin:auto;
            background:white;
            border-radius:16px;
            padding:40px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
        }

        h1{
            text-align:center;
            font-size:42px;
            color:#111;
            margin-bottom:35px;
        }

        form{
            text-align:center;
            margin-bottom:20px;
        }

        input[type="file"]{
            font-size:16px;
            margin-bottom:20px;
        }

        .threshold-row{
            margin:20px 0;
            font-size:20px;
            font-weight:bold;
        }

        .threshold-row input{
            width:220px;
            padding:10px;
            font-size:18px;
            margin-left:10px;
            border:1px solid #bbb;
            border-radius:8px;
        }

        button{
            background:#1d72f3;
            color:white;
            border:none;
            padding:14px 30px;
            font-size:18px;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#0c5fe0;
        }

        hr{
            margin:35px 0;
            border:0;
            border-top:1px solid #ddd;
        }

        h2{
            text-align:center;
            font-size:34px;
            margin-bottom:25px;
        }

        .result-table{
            width:100%;
            max-width:700px;
            margin:auto;
            border-collapse:collapse;
        }

        .result-table td{
            padding:14px 10px;
            font-size:24px;
            border-bottom:1px solid #eee;
        }

        .result-table td:first-child{
            width:55%;
            text-align:right;
            font-weight:bold;
            padding-right:20px;
            color:#111;
        }

        .result-table td:last-child{
            text-align:left;
            color:#333;
        }

        .charts{
            margin-top:35px;
        }

        .charts img{
            width:100%;
            margin-bottom:20px;
            border-radius:10px;
            border:1px solid #ddd;
        }

        .download{
            text-align:center;
            margin-top:20px;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>Retail Anomaly Detection</h1>

    <form action="/upload" method="post" enctype="multipart/form-data">

        <input type="file" name="file" required>

        <div class="threshold-row">
            Threshold:
            <input type="number" name="threshold" step="0.1" value="2.0">
        </div>

        <button type="submit">Detect Anomalies</button>

    </form>

    {% if show_result %}

    <hr>

    <h2>Results</h2>

    <table class="result-table">

        <tr>
            <td>File:</td>
            <td>{{ filename }}</td>
        </tr>

        <tr>
            <td>Detected Column:</td>
            <td>{{ column }}</td>
        </tr>

        <tr>
            <td>Total Transactions:</td>
            <td>{{ total }}</td>
        </tr>

        <tr>
            <td>Threshold Used:</td>
            <td>{{ threshold }}</td>
        </tr>

        <tr>
            <td>Anomalies Found:</td>
            <td>{{ anomalies }}</td>
        </tr>

        <tr>
            <td>Total |Z-score|:</td>
            <td>{{ total_z }}</td>
        </tr>

        <tr>
            <td>Anomalies |Z-score| Sum:</td>
            <td>{{ anomaly_z }}</td>
        </tr>

    </table>

    <div class="charts">
        <img src="{{ url_for('static', filename='chart1.png') }}">
        <img src="{{ url_for('static', filename='chart2.png') }}">
        <img src="{{ url_for('static', filename='chart3.png') }}">
    </div>

    <div class="download">
        <a href="/download">
            <button>Download Report</button>
        </a>
    </div>

    {% endif %}

</div>

</body>
</html>
